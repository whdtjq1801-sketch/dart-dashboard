<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DART 공시 대시보드</title>
<style>
:root {
  --primary: #1a73e8;
  --success: #34a853;
  --danger:  #ea4335;
  --bg:      #f1f3f4;
  --card:    #ffffff;
  --border:  #e0e0e0;
  --text:    #202124;
  --muted:   #5f6368;
  --radius:  8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* ── header ── */
header {
  background: var(--primary);
  color: white;
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
header h1 { font-size: 17px; font-weight: 600; letter-spacing: -.3px; }
.status-badge {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 13px;
  background: rgba(255,255,255,.15);
  padding: 5px 12px;
  border-radius: 20px;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,.5);
  flex-shrink: 0;
}
.dot.running { background: #81c995; animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── control bar ── */
.ctrl {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 9px 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
button {
  padding: 7px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: filter .15s;
}
button:hover:not(:disabled) { filter: brightness(.92); }
button:disabled { opacity: .38; cursor: default; }
.btn-go   { background: var(--success); color: white; }
.btn-stop { background: var(--danger);  color: white; }
.btn-blue { background: var(--primary); color: white; }
.btn-grey { background: #f1f3f4; color: var(--text); border: 1px solid var(--border); }

.interval-row { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--muted); margin-left: 4px; }
input[type=range] { width: 130px; accent-color: var(--primary); cursor: pointer; }

/* ── main layout ── */
.main {
  flex: 1;
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  overflow: hidden;
}

.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-left  { flex: 0 0 380px; }
.panel-right { flex: 1; min-width: 0; }

/* ── tabs ── */
.tabs { display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.tab {
  padding: 10px 18px;
  font-size: 13px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all .15s;
  user-select: none;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 500; }

.tab-body { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-body.active { display: flex; }
.tab-scroll { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }

/* ── company panel ── */
.add-row { display: flex; gap: 8px; }
input[type=text] {
  flex: 1;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color .15s;
}
input[type=text]:focus { border-color: var(--primary); }

.co-list { display: flex; flex-direction: column; gap: 3px; }
.co-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: #f8f9fa;
  border-radius: 6px;
  font-size: 13px;
}
.co-del {
  background: none;
  color: var(--muted);
  padding: 2px 7px;
  font-size: 11px;
  border: 1px solid var(--border);
  border-radius: 4px;
}
.co-del:hover { color: var(--danger) !important; border-color: var(--danger) !important; filter: none; }

/* ── disclosure list ── */
.disc-toolbar { display: flex; align-items: center; gap: 8px; flex-shrink: 0; padding: 8px 12px; border-bottom: 1px solid var(--border); }
.disc-count { font-size: 12px; color: var(--muted); }

.disc-list { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 2px; }
.disc-item {
  padding: 8px 10px;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  border: 1px solid transparent;
  transition: all .1s;
  line-height: 1.5;
}
.disc-item:hover  { background: #f0f4ff; border-color: #c5d8fb; }
.disc-item.sel    { background: #e8f0fe; border-color: var(--primary); }
.disc-corp { font-weight: 600; color: var(--primary); }
.disc-date { color: var(--muted); font-size: 11px; margin-top: 1px; }

/* ── gpt panel ── */
.panel-right-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}
.gpt-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  font-size: 14px;
  line-height: 1.8;
}
.gpt-placeholder { color: var(--muted); text-align: center; padding-top: 80px; font-size: 14px; }
.gpt-corp  { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.gpt-date  { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.price-bar {
  background: #e8f0fe;
  border-left: 3px solid var(--primary);
  padding: 8px 12px;
  border-radius: 0 6px 6px 0;
  color: #1558b0;
  font-size: 13px;
  margin-bottom: 14px;
}
.gpt-divider { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.gpt-text { white-space: pre-wrap; font-size: 13.5px; line-height: 1.9; }
.dart-link {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 14px;
  color: var(--primary);
  font-size: 12px;
  text-decoration: none;
  padding: 5px 10px;
  border: 1px solid #c5d8fb;
  border-radius: 6px;
  background: #f0f4ff;
}
.dart-link:hover { background: #e8f0fe; }
.loading-msg { color: var(--muted); display: flex; align-items: center; gap: 8px; }
.spin {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── log bar ── */
.log-bar {
  background: #2d2d2d;
  color: #a8c7fa;
  padding: 6px 20px;
  font-size: 11.5px;
  font-family: 'Consolas', monospace;
  height: 56px;
  overflow-y: auto;
  flex-shrink: 0;
}
.log-bar span { display: block; line-height: 1.6; }

.empty { color: var(--muted); font-size: 13px; padding: 4px 0; }
</style>
</head>
<body>

<header>
  <h1>📊 DART 공시 대시보드</h1>
  <div class="status-badge">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">대기 중</span>
  </div>
</header>

<div class="ctrl">
  <button class="btn-go"   id="startBtn" onclick="startMonitor()">▶ 시작</button>
  <button class="btn-stop" id="stopBtn"  onclick="stopMonitor()" disabled>■ 중지</button>
  <div class="interval-row">
    <span>체크 주기</span>
    <input type="range" id="slider" min="5" max="120" step="5" value="60"
           oninput="document.getElementById('iVal').textContent=this.value">
    <span><b id="iVal">60</b>분</span>
  </div>
</div>

<div class="main">

  <!-- LEFT -->
  <div class="panel panel-left">
    <div class="tabs">
      <div class="tab active" onclick="showTab('companies',this)">관심기업</div>
      <div class="tab"        onclick="showTab('disclosures',this)">공시목록</div>
    </div>

    <!-- 관심기업 탭 -->
    <div class="tab-body active" id="tab-companies">
      <div class="tab-scroll">
        <div class="add-row">
          <input type="text" id="coInput" placeholder="기업명 입력 (예: 삼성전자)"
                 onkeydown="if(event.key==='Enter')addCompany()">
          <button class="btn-blue" onclick="addCompany()">추가</button>
        </div>
        <div class="co-list" id="coList">
          <p class="empty">등록된 기업이 없습니다.</p>
        </div>
      </div>
    </div>

    <!-- 공시목록 탭 -->
    <div class="tab-body" id="tab-disclosures">
      <div class="disc-toolbar">
        <button class="btn-grey" onclick="loadDiscs()" style="font-size:12px;padding:5px 12px">🔄 새로고침</button>
        <span class="disc-count" id="discCount"></span>
      </div>
      <div class="disc-list" id="discList">
        <p class="empty" style="padding:12px">공시 새로고침을 눌러주세요.</p>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="panel panel-right">
    <div class="panel-right-header">GPT 해석</div>
    <div class="gpt-body" id="gptBody">
      <p class="gpt-placeholder">👈 공시를 클릭하면 GPT 해석이 표시됩니다</p>
    </div>
  </div>

</div>

<div class="log-bar" id="logBar">
  <span style="color:#555">실행 로그가 여기에 표시됩니다</span>
</div>

<script>
// ── tab switch ────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-body').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
}

// ── companies ─────────────────────────────────────────
async function loadCompanies() {
  const r = await fetch('/api/companies');
  render_companies(await r.json());
}

function render_companies(list) {
  const el = document.getElementById('coList');
  if (!list.length) { el.innerHTML = '<p class="empty">등록된 기업이 없습니다.</p>'; return; }
  el.innerHTML = list.map(n =>
    `<div class="co-item">
       <span>${n}</span>
       <button class="btn-grey co-del" onclick="delCompany('${encodeURIComponent(n)}')">✕ 삭제</button>
     </div>`
  ).join('');
}

async function addCompany() {
  const inp = document.getElementById('coInput');
  const name = inp.value.trim();
  if (!name) return;
  const r = await fetch('/api/companies', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  render_companies(await r.json());
  inp.value = '';
}

async function delCompany(enc) {
  const r = await fetch('/api/companies/' + enc, {method:'DELETE'});
  render_companies(await r.json());
}

// ── disclosures ───────────────────────────────────────
let _discs = [];

async function loadDiscs() {
  document.getElementById('discCount').textContent = '⏳ 불러오는 중...';
  document.getElementById('discList').innerHTML = '';
  try {
    const r = await fetch('/api/disclosures');
    const data = await r.json();
    if (data.error) { document.getElementById('discCount').textContent = '❌ ' + data.error; return; }
    _discs = data;
    render_discs(data);
    document.getElementById('discCount').textContent = `총 ${data.length}건 (최근 90일)`;
    if (data.length) showTab('disclosures', document.querySelectorAll('.tab')[1]);
  } catch(e) {
    document.getElementById('discCount').textContent = '❌ 네트워크 오류';
  }
}

function render_discs(list) {
  const el = document.getElementById('discList');
  if (!list.length) { el.innerHTML = '<p class="empty" style="padding:12px">최근 90일 공시 없음</p>'; return; }
  el.innerHTML = list.map((d, i) =>
    `<div class="disc-item" id="di${i}" onclick="onDiscClick(${i},this)">
       <div><span class="disc-corp">[${d.corp_name}]</span> ${d.report_nm}</div>
       <div class="disc-date">${d.rcept_dt}</div>
     </div>`
  ).join('');
}

async function onDiscClick(idx, el) {
  document.querySelectorAll('.disc-item').forEach(e => e.classList.remove('sel'));
  el.classList.add('sel');
  const d = _discs[idx];

  document.getElementById('gptBody').innerHTML =
    `<div class="loading-msg"><div class="spin"></div> GPT 해석 중... <span style="color:#aaa;font-size:12px">[${d.corp_name}] ${d.report_nm}</span></div>`;

  try {
    const r = await fetch('/api/interpret', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({rcept_no:d.rcept_no, corp_name:d.corp_name, report_nm:d.report_nm, stock_code:d.stock_code})
    });
    const res = await r.json();
    if (res.error) { document.getElementById('gptBody').innerHTML = `<p style="color:red">❌ ${res.error}</p>`; return; }

    const pi = res.price_info;
    const priceHtml = pi
      ? `<div class="price-bar">📈 주가: <b>${pi.price_str}</b> &nbsp;|&nbsp; 거래량: ${pi.volume_str}</div>`
      : '';
    const dartUrl = `https://dart.fss.or.kr/dsaf001/main.do?rcpNo=${d.rcept_no}`;

    document.getElementById('gptBody').innerHTML =
      `<div class="gpt-corp">[${d.corp_name}] ${d.report_nm}</div>
       <div class="gpt-date">접수일: ${d.rcept_dt}</div>
       ${priceHtml}
       <hr class="gpt-divider">
       <div class="gpt-text">${res.summary}</div>
       <a class="dart-link" href="${dartUrl}" target="_blank">📄 DART 원문 보기</a>`;
  } catch(e) {
    document.getElementById('gptBody').innerHTML = `<p style="color:red">❌ 오류 발생</p>`;
  }
}

// ── monitor control ───────────────────────────────────
async function startMonitor() {
  const interval = parseInt(document.getElementById('slider').value);
  const r = await fetch('/api/monitor/start', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({interval})
  });
  const d = await r.json();
  setUI(d.running);
  if (d.running) loadDiscs();
}

async function stopMonitor() {
  await fetch('/api/monitor/stop', {method:'POST'});
  setUI(false);
}

function setUI(running) {
  document.getElementById('startBtn').disabled = running;
  document.getElementById('stopBtn').disabled  = !running;
  document.getElementById('dot').className     = 'dot' + (running ? ' running' : '');
  document.getElementById('statusTxt').textContent = running ? '실행 중' : '대기 중';
}

// ── status poll (2s) ──────────────────────────────────
setInterval(async () => {
  try {
    const r = await fetch('/api/status');
    const d = await r.json();
    setUI(d.running);
    if (d.logs && d.logs.length) {
      const lb = document.getElementById('logBar');
      lb.innerHTML = d.logs.map(l => `<span>${l}</span>`).join('');
      lb.scrollTop = lb.scrollHeight;
    }
  } catch {}
}, 2000);

// ── init ──────────────────────────────────────────────
loadCompanies();
</script>
</body>
</html>
